# create a github action to email a report from a file at 6am daily

name: Email Report

on:
  schedule:
    - cron: "0 6 * * *"

jobs:
  email_report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v2

    - name: Email Report
      run: |
        echo "Emailing report to stakeholders"
        echo "Report attached" | mail -s "Morning Report" -A deploy-app.yaml